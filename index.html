<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Recuperação</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="flex align-center justify-center" style="flex-direction: column;">
  <!-- TELA SPLASH -->
  <section id="tela-splash" class="tela-ativa w-100">
    <div class="splash-container">
      <img src="media/splash.png" alt="Quiz de Recuperação" class="splash-imagem" id="splash-imagem">
      <p class="splash-instrucao">Clique ou pressione qualquer tecla para começar</p>
    </div>
  </section>

  <!-- TELA 1: Grid de seleção -->
  <section id="tela-grid" class="tela-oculta text-center w-100">
    <h1>QUIZ DE RECUPERAÇÃO</h1>
    <h2>Selecione o Jogador</h2>

    <!-- Container do Ranking do Dia -->
    <div id="ranking-container" class="tela-oculta"></div>

    <div id="grid-alunos" class="grid-alunos">
      <!-- Os botões de cada aluno serão inseridos aqui via JavaScript -->
    </div>

    <button id="btn-sortear-jogador" class="btn btn-destaque">
      🎲 Sortear Jogador
    </button>
  </section>

  <!-- TELA 2: Confirmação (conteúdo já existente modificado) -->
  <section id="tela-confirmacao" class="tela-oculta text-center w-100">
    <h1>QUIZ DE RECUPERAÇÃO</h1>

    <div class="mt-4" style="background-color: #2b2b2b; padding: 40px; border-radius: 15px; display: inline-block; min-width: 50%;">
      <div id="nome-jogador" class="text-verde" style="font-size: 3.5rem; margin-bottom: 30px; transition: opacity 0.3s; font-weight: bold;">
        Carregando...
      </div>

      <div class="botoes-confirmacao">
        <button id="btn-sortear" class="btn" disabled>🔄 Sortear Novamente</button>
        <button id="btn-confirmar" class="btn" style="background-color: #03D92D; color: #1a1a1a;" disabled>✅ Confirmar Jogador</button>
      </div>

      <button id="btn-escolher-lista" class="btn btn-secundario">
        📋 Escolher na Lista de Jogadores
      </button>
    </div>
  </section>

  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
